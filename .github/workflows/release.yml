name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build framework-dependent release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Publish
        run: >
          dotnet publish src/ZipCode.Cli/ZipCode.Cli.csproj
          -c Release
          --self-contained false
          -o artifacts/publish/zip-code

      - name: Package release asset
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/release | Out-Null
          Compress-Archive `
            -Path "artifacts/publish/zip-code/*" `
            -DestinationPath "artifacts/release/zip-code.zip" `
            -Force

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/release/zip-code.zip